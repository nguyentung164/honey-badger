<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Monaco Editor gutter icons (folding, etc.) need Codicon font; load from CDN to fix square boxes in Electron -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vscode-codicons@0.0.17/dist/codicon.min.css" crossorigin="anonymous" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    connect-src 'self' https://cdn.jsdelivr.net;
    media-src 'self' data:;
    img-src 'self' data:;
    script-src 'self' https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net;
    font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net;
    frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://youtube.com;
    worker-src 'self' blob:;
    object-src 'none';
  ">
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; }
    app { display: block; height: 100%; }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); opacity: 0.9; }
      50% { transform: translateY(-4px); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      min-height: 100vh;
      color: #9ca3af;
      font-family: system-ui, sans-serif;
      font-size: 1rem;
      animation: fadeIn 0.5s ease-out forwards;
    }
    .loading-logo {
      width: 6rem;
      height: auto;
      object-fit: contain;
      filter: brightness(1.3);
      animation: logoFloat 2s ease-in-out infinite;
    }
    .loading-text {
      animation: pulse 1.5s ease-in-out infinite;
    }
    .loading-dots {
      display: inline-block;
    }
    .loading-dots span {
      animation: dotPulse 0.6s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>

<body>
  <app>
    <div class="loading-container">
      <img src="logo.png" alt="Logo" class="loading-logo" />
      <span class="loading-text-wrapper"><span class="loading-text-wrapper"><span class="loading-text">Loading</span><span class="loading-dots"><span>.</span><span>.</span><span>.</span></span></span></span>
    </div>
  </app>
  <script type="module" src="index.tsx"></script>
</body>

</html>
